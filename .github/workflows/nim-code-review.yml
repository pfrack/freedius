name: NIM Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pfrack/review-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          nim_api_key: ${{ secrets.NIM_API_KEY }}
