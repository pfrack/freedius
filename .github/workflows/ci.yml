name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - name: Cache tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ runner.go-version }}-${{ hashFiles('magefiles/mage.go') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-${{ runner.go-version }}-
      - name: Install Mage
        run: go install github.com/magefile/mage@v1.17.2
      - name: CI
        run: mage ci
        env:
          COVERPROFILE: coverage.out
      - name: Upload coverage artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: warn
          retention-days: 30
