{{define "logs"}}{{template "layout" .}}{{end}}
{{define "title"}}Logs{{end}}
{{define "content"}}
  <h1>Logs</h1>
  <label class="form-label" for="level-filter">Filter</label>
  <select
    id="level-filter"
    class="form-select"
    name="min"
    hx-get="/logs"
    hx-target="#log"
    hx-trigger="change"
    hx-replace-url="true"
    style="max-width: 200px; margin-bottom: 1rem;"
  >
    <option value="" {{if not .Level}}selected{{end}}>All</option>
    <option value="debug" {{if eq .Level "debug"}}selected{{end}}>Debug</option>
    <option value="info" {{if eq .Level "info"}}selected{{end}}>Info</option>
    <option value="warn" {{if eq .Level "warn"}}selected{{end}}>Warn</option>
    <option value="error" {{if eq .Level "error"}}selected{{end}}>Error</option>
  </select>
  <div
    id="log"
    hx-ext="sse"
    sse-connect="/v1/logs"
  >
    {{if not .Entries}}
    <small class="text-muted">Waiting for log events…</small>
    {{end}}
    {{range .Entries}}<pre class="log-{{.Level}}">{{.Line}}</pre>{{end}}
  </div>
{{end}}
{{define "scripts"}}
<script>
  document.addEventListener('htmx:sseMessage', function(e) {
    if (e.detail.eventName !== 'log') return;
    try {
      var data = JSON.parse(e.detail.data);
      var pre = document.createElement('pre');
      pre.className = 'log-' + data.level;
      pre.textContent = data.line;
      document.getElementById('log').appendChild(pre);
      // Auto-scroll to bottom
      var logEl = document.getElementById('log');
      logEl.scrollTop = logEl.scrollHeight;
    } catch (err) {
      // Fallback: render raw data as info
      var pre = document.createElement('pre');
      pre.className = 'log-info';
      pre.textContent = e.detail.data;
      document.getElementById('log').appendChild(pre);
    }
  });
</script>
{{end}}
