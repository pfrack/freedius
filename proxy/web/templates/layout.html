{{define "layout"}}<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}{{end}} — freedius</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('sidebar--open');document.querySelector('.sidebar-overlay').classList.toggle('sidebar-overlay--visible')" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('sidebar--open');this.classList.remove('sidebar-overlay--visible')"></div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        freedius
      </div>
      <nav>
        <a href="/" class="{{if eq .Active "index"}}active{{end}}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="/logs" class="{{if eq .Active "logs"}}active{{end}}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Logs
        </a>
        <a href="/providers" class="{{if eq .Active "providers"}}active{{end}}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
          Providers
        </a>
        <a href="/mappings" class="{{if eq .Active "mappings"}}active{{end}}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          Mappings
        </a>
      </nav>
    </aside>

    <main>
      {{block "content" .}}{{end}}
    </main>
    <div id="toast-region" aria-live="polite" role="status"></div>
    {{block "scripts" .}}{{end}}
    <script src="/static/htmx.min.js"></script>
    <script>
      // Global HTMX error/success wiring. Phase 3 of web-ui-friendliness.
      document.body.addEventListener('htmx:afterRequest', function(evt) {
        var xhr = evt.detail && evt.detail.xhr;
        if (!xhr) return;
        var successful = evt.detail.successful;
        var target = evt.detail.target || evt.target;
        var verb = (xhr.requestBody && xhr.requestBody.length > 0) ||
                   (evt.detail.requestConfig && evt.detail.requestConfig.verb !== 'GET');

        // Reset any inline form-error slots when the response is successful.
        if (successful) {
          var slot = (target && target.closest && target.closest('dialog') &&
                      target.closest('dialog').querySelector('.form-error')) || null;
          if (slot) slot.textContent = '';
          // Brief success toast for mutations (POST/PUT/DELETE).
          if (verb) showToast('Saved', 'success');
          return;
        }

        // 401 when no auth token is configured is impossible; with auth token,
        // surface as a toast. 4xx/5xx from form submissions populate the
        // matching inline-error slot; everything else becomes a toast.
        var status = xhr.status;
        var errMsg = '';
        var fields = null;
        try {
          var data = JSON.parse(xhr.responseText || '{}');
          errMsg = data.message || data.error || '';
          fields = data.fields || null;
        } catch (e) { /* not JSON; fall through */ }

        var dialog = target && target.closest && target.closest('dialog');
        if (dialog) {
          var slot = dialog.querySelector('.form-error');
          if (slot) {
            var html = '';
            if (errMsg) html += '<div>' + escapeHTML(errMsg) + '</div>';
            if (fields) {
              html += '<ul>';
              for (var k in fields) {
                if (Object.prototype.hasOwnProperty.call(fields, k)) {
                  html += '<li><strong>' + escapeHTML(k) + '</strong>: ' +
                            escapeHTML(fields[k]) + '</li>';
                }
              }
              html += '</ul>';
            }
            slot.innerHTML = html;
            // Keep the dialog open on validation failure.
            return;
          }
        }

        // Non-form request (delete, fetch, etc.): global toast.
        showToast(errMsg || ('Request failed (' + status + ')'), 'error');
      });

      function showToast(message, kind) {
        var region = document.getElementById('toast-region');
        if (!region) return;
        var toast = document.createElement('div');
        toast.className = 'toast' + (kind === 'success' ? ' toast--success' : '');
        toast.textContent = message;
        region.appendChild(toast);
        setTimeout(function() {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 4000);
      }

      function escapeHTML(s) {
        return String(s).replace(/[&<>"']/g, function(c) {
          return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
        });
      }
    </script>
  </body>
</html>{{end}}
