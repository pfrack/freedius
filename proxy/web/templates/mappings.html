{{define "mappings"}}{{template "layout" .}}{{end}}
{{define "title"}}Mappings{{end}}
{{define "content"}}
  <h1>Mappings</h1>
  <button class="btn-primary" onclick="document.getElementById('mapping-dialog').showModal()">
    + Add Mapping
  </button>
  <div id="mapping-form-error" class="form-error"></div>
  {{template "mappings-table" .}}

  <dialog id="mapping-dialog">
    <form
      id="mapping-form"
      hx-post="/v1/mappings"
      hx-target="#mappings"
      hx-swap="outerHTML"
      hx-on::after-request="if(event.detail.successful) this.closest('dialog').close()"
    >
      <h2 id="mapping-dialog-title">Add Mapping</h2>
      <div id="mapping-form-error-dialog" class="form-error"></div>
      <label>Name <input name="name" required></label>
      <label>
        Provider
        <select name="provider_name">
          {{range .Providers}}<option value="{{.Name}}">{{.Name}}</option>{{end}}
        </select>
      </label>
      <label>
        Model
        <input name="model_string" required>
        <button type="button" class="btn-sm" onclick="
          var sel = document.getElementById('mapping-form').elements.provider_name;
          var name = sel.value;
          if (!name) return;
          htmx.ajax('POST', '/v1/providers/'+name+'/models/refresh', {target:'#model-suggestions', swap:'innerHTML'});
        ">Fetch models</button>
      </label>
      <div id="model-suggestions"></div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">Save</button>
        <button type="button" class="btn-cancel" onclick="this.closest('dialog').close()">
          Cancel
        </button>
      </div>
    </form>
  </dialog>

  <script>
    function editMapping(name, provider, model) {
      var d = document.getElementById('mapping-dialog');
      var f = document.getElementById('mapping-form');
      f.setAttribute('hx-put', '/v1/mappings/' + name);
      f.removeAttribute('hx-post');
      f.elements.name.value = name;
      f.elements.name.readOnly = true;
      f.elements.provider_name.value = provider;
      f.elements.model_string.value = model;
      document.getElementById('mapping-dialog-title').textContent = 'Edit Mapping';
      d.showModal();
    }

    document.getElementById('model-suggestions').addEventListener('click', function(e) {
      var li = e.target.closest('li[data-model-id]');
      if (!li) return;
      document.getElementById('mapping-form').elements.model_string.value = li.dataset.modelId;
      this.innerHTML = '';
    });
  </script>
{{end}}
