{{define "mappings"}}{{template "layout" .}}{{end}}
{{define "title"}}Mappings{{end}}
{{define "content"}}
  <h1>Mappings</h1>
  <button class="btn btn--primary" onclick="document.getElementById('mapping-dialog').showModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Mapping
  </button>
  <div id="mapping-form-error" class="form-error"></div>
  {{template "mappings-table" .}}

  <dialog id="mapping-dialog">
    <form
      id="mapping-form"
      hx-post="/v1/mappings"
      hx-target="#mappings"
      hx-swap="outerHTML"
      hx-on::after-request="if(event.detail.successful) this.closest('dialog').close()"
    >
      <h2 id="mapping-dialog-title">Add Mapping</h2>
      <div id="mapping-form-error-dialog" class="form-error"></div>
      <div class="form-group">
        <label class="form-label" for="mapping-name">Name</label>
        <input class="form-input" id="mapping-name" name="name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="mapping-provider">Provider</label>
        <select class="form-select" id="mapping-provider" name="provider_name">
          {{range .Providers}}<option value="{{.Name}}">{{.Name}}</option>{{end}}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="mapping-model">Model</label>
        <input class="form-input" id="mapping-model" name="model_string" required>
        <button type="button" class="btn btn--ghost btn--sm" onclick="
          var sel = document.getElementById('mapping-form').elements.provider_name;
          var name = sel.value;
          if (!name) return;
          htmx.ajax('POST', '/v1/providers/'+name+'/models/refresh', {target:'#model-suggestions', swap:'innerHTML'});
        ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Fetch models
        </button>
      </div>
      <div id="model-suggestions"></div>

      <fieldset id="fallback-fieldset" style="border:1px solid #555;border-radius:4px;padding:8px;margin-top:8px;">
        <legend style="font-size:0.85em;color:#aaa;">Fallback Chain</legend>
        <div id="fallback-rows"></div>
        <button type="button" class="btn btn--ghost btn--sm" onclick="addFallbackRow()" style="margin-top:4px;">
          + Add fallback
        </button>
      </fieldset>

      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Save</button>
        <button type="button" class="btn-cancel" onclick="this.closest('dialog').close()">
          Cancel
        </button>
      </div>
    </form>
  </dialog>

  <script>
    function editMapping(btn) {
      var ds = btn.dataset;
      var d = document.getElementById('mapping-dialog');
      var f = document.getElementById('mapping-form');
      f.setAttribute('hx-put', '/v1/mappings/' + ds.name);
      f.removeAttribute('hx-post');
      f.elements.name.value = ds.name;
      f.elements.name.readOnly = true;
      f.elements.provider_name.value = ds.provider;
      f.elements.model_string.value = ds.model;
      document.getElementById('mapping-dialog-title').textContent = 'Edit Mapping';

      var container = document.getElementById('fallback-rows');
      container.innerHTML = '';
      try {
        var fallbacks = JSON.parse(ds.fallbacks);
        fallbacks.forEach(function(fb) {
          addFallbackRow(fb.ProviderName, fb.Model);
        });
      } catch (e) {
        console.error("Failed to parse fallbacks:", e);
      }

      d.showModal();
    }

    document.getElementById('model-suggestions').addEventListener('click', function(e) {
      var li = e.target.closest('li[data-model-id]');
      if (!li) return;
      document.getElementById('mapping-form').elements.model_string.value = li.dataset.modelId;
      this.innerHTML = '';
    });

    function addFallbackRow(provider, model) {
      var container = document.getElementById('fallback-rows');
      var idx = container.children.length;
      var suggestId = 'fallback-suggestions-' + idx;
      var row = document.createElement('div');
      row.style.cssText = 'margin-bottom:8px;';
      row.innerHTML =
        '<div style="display:flex;gap:6px;align-items:center;">' +
          '<select class="form-select" name="fallback_provider_name[]" style="flex:1;">' +
            '{{range .Providers}}<option value="{{.Name}}">{{.Name}}</option>{{end}}' +
          '</select>' +
          '<input class="form-input" name="fallback_model_string[]" placeholder="model" style="flex:1;" value="' + (model || '') + '">' +
          '<button type="button" class="btn btn--ghost btn--sm" onclick="var s=this.parentElement.querySelector(\'select\');if(s.value)htmx.ajax(\'POST\',\'/v1/providers/\'+s.value+\'/models/refresh\',{target:\'#' + suggestId + '\',swap:\'innerHTML\'});">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' +
          '</button>' +
          '<button type="button" class="btn btn--danger btn--sm" onclick="this.closest(\'div[style*=margin-bottom]\').remove()">×</button>' +
        '</div>' +
        '<div id="' + suggestId + '"></div>';
      if (provider) {
        row.querySelector('select').value = provider;
      }
      container.appendChild(row);

      // Wire up click-to-fill for this row's suggestions.
      row.querySelector('#' + suggestId).addEventListener('click', function(e) {
        var li = e.target.closest('li[data-model-id]');
        if (!li) return;
        row.querySelector('input[name="fallback_model_string[]"]').value = li.dataset.modelId;
        this.innerHTML = '';
      });
    }
  </script>
{{end}}
