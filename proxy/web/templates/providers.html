{{define "providers"}}{{template "layout" .}}{{end}}
{{define "title"}}Providers{{end}}
{{define "content"}}
  <h1>Providers</h1>
  <button class="btn btn--primary" onclick="openAddProvider()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Provider
  </button>
  <div id="provider-form-error" class="form-error"></div>
  {{template "providers-table" .}}

  <dialog id="provider-dialog">
    <form
      id="provider-form"
      hx-post="/v1/providers"
      hx-target="#providers"
      hx-swap="outerHTML"
      hx-on::after-request="if(event.detail.successful) this.closest('dialog').close()"
    >
      <h2 id="provider-dialog-title">Add Provider</h2>
      <div id="provider-form-error-dialog" class="form-error"></div>
      <div class="form-group">
        <label class="form-label" for="provider-name">Name</label>
        <input class="form-input" id="provider-name" name="name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="provider-behavior">Behavior</label>
        <select class="form-select" id="provider-behavior" name="behavior">
          <option value="openai">openai</option>
          <option value="anthropic">anthropic</option>
          <option value="mix">mix</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="provider-base-url">Base URL</label>
        <input class="form-input" id="provider-base-url" name="default_base_url" type="url">
      </div>
      <div class="form-group">
        <label class="form-label" for="provider-api-key">API Key Env</label>
        <input class="form-input" id="provider-api-key" name="default_api_key_env">
      </div>
      <div class="form-group">
        <label class="form-label" for="provider-protocol">Protocol</label>
        <select class="form-select" id="provider-protocol" name="protocol">
          <option value="">auto</option>
          <option value="openai">openai</option>
          <option value="anthropic">anthropic</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Save</button>
        <button type="button" class="btn-cancel" onclick="cancelProviderDialog()">
          Cancel
        </button>
      </div>
    </form>
  </dialog>

  <script>
    function resetProviderForm() {
      var f = document.getElementById('provider-form');
      f.reset();
      f.removeAttribute('hx-put');
      f.setAttribute('hx-post', '/v1/providers');
      f.elements.name.readOnly = false;
      document.getElementById('provider-dialog-title').textContent = 'Add Provider';
      var err = document.getElementById('provider-form-error-dialog');
      if (err) err.textContent = '';
    }

    function openAddProvider() {
      resetProviderForm();
      document.getElementById('provider-dialog').showModal();
    }

    function cancelProviderDialog() {
      var d = document.getElementById('provider-dialog');
      d.close();
      resetProviderForm();
    }

    function editProvider(name, behavior, base_url, api_key_env, protocol) {
      var d = document.getElementById('provider-dialog');
      var f = document.getElementById('provider-form');
      f.removeAttribute('hx-post');
      f.setAttribute('hx-put', '/v1/providers/' + name);
      f.elements.name.value = name;
      f.elements.name.readOnly = true;
      f.elements.behavior.value = behavior;
      f.elements.default_base_url.value = base_url;
      f.elements.default_api_key_env.value = api_key_env;
      f.elements.protocol.value = protocol;
      document.getElementById('provider-dialog-title').textContent = 'Edit Provider';
      d.showModal();
    }
  </script>
{{end}}
