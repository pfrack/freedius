{{define "mappings-table"}}
<div id="mappings" class="mappings-grid">
  {{range .Mappings}}
  <div class="route-card">
    <div class="route-card__header">
      <h3 class="route-card__name">{{.Name}}</h3>
      <div class="route-card__actions">
        <button
          class="btn btn--ghost btn--sm"
          onclick="editMapping(this)"
          data-name="{{.Name | js}}"
          data-provider="{{.ProviderName | js}}"
          data-model="{{.Model | js}}"
          data-fallbacks='{{.Fallbacks | jsonMarshal | js}}'
        >
          Edit
        </button>
        <button
          class="btn btn--danger btn--sm"
          hx-delete="/v1/mappings/{{.Name}}"
          hx-confirm="Delete mapping '{{.Name}}?"
          hx-target="#mappings"
          hx-swap="outerHTML"
        >
          Delete
        </button>
      </div>
    </div>
    <div class="route-chain">
      <div class="route-step route-step--primary">
        {{.ProviderName}} / {{.Model}}
      </div>
      {{range .Fallbacks}}
      <div class="route-step route-step--fallback">
        {{.ProviderName}} / {{.Model}}
      </div>
      {{end}}
    </div>
  </div>
  {{end}}
</div>
{{end}}
