# freedius starter config — edit and save as freedius.yaml
# For more examples, see: config.example.yaml
#
# Model families recognized in requests:
#   opus, sonnet, haiku, auto, default
# Provider behaviors: openai, anthropic, mix
#
# Export OPENCODE_API_KEY before running freedius:
#   export OPENCODE_API_KEY=<your-key>
# (freedius reads keys from environment, not from this file).

providers:
  # NVIDIA NIM — built-in defaults
  nim: { behavior: openai, default_api_key_env: NVIDIA_NIM_API_KEY }
  # Opencode Zen — Anthropic-format endpoint
  zen: { behavior: mix, default_base_url: https://opencode.ai/zen/v1/messages, default_api_key_env: OPENCODE_API_KEY }
  # Opencode Go — openai-format /v1/chat/completions
  go:  { behavior: mix, default_base_url: https://opencode.ai/zen/go/v1/chat/completions, default_api_key_env: OPENCODE_API_KEY }

mappings:
  # Opencode Go (OpenAI-format base_url)
  opus:    { provider_name: go, model_string: deepseek-v4-pro }
  # Opencode Go (OpenAI-format base_url)
  sonnet:  { provider_name: go, model_string: deepseek-v4-flash }
  # NVIDIA NIM (built-in defaults)
  haiku:   { provider_name: nim, model_string: stepfun-ai/step-3.5-flash }
  # Opencode Go (OpenAI-format base_url)
  auto:    { provider_name: go, model_string: deepseek-v4-flash }
  # Catch-all for any Claude Code model not matched above
  default: { provider_name: go, model_string: deepseek-v4-pro }
