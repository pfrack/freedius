# providers.yaml — single source of truth for all freedius provider metadata.
#
# Each entry declares a user-facing provider name plus its runtime behavior
# class, default values, and adapter-specific tweaks. Adding a provider is
# one YAML entry + `go generate ./...`.
#
# Field reference:
#   behavior:           openai | anthropic | mix — runtime adapter class
#   default_base_url:   URL applied when user does not set default_base_url
#   default_api_key_env: env-var name applied when user does not set
#                        default_api_key_env
#   require_base_url:   true if the adapter needs an explicit default_base_url
#                       (false when default_base_url is provided)
#   manual:             true to skip adapter generation — user provides
#                       hand-written logic and wires it via NewDefaultRegistry
#                       overrides; the provider still appears in
#                       providerDefaults with its declared defaults.
#   openai:             openai-behavior-specific adapter tweaks
#     no_stream_usage:  suppress OpenAI stream_options.include_usage
#     pre_send_hook:    name of a func([]byte)([]byte, error) in the proxy
#                       package invoked before sending the request body

providers:
  nim:
    behavior: openai
    default_base_url: https://integrate.api.nvidia.com/v1/chat/completions
    default_api_key_env: NVIDIA_NIM_API_KEY
    require_base_url: false
    openai:
      no_stream_usage: true
      pre_send_hook: sanitizeNIMBody

  zen:
    behavior: mix
    default_api_key_env: OPENCODE_API_KEY
    require_base_url: true

  go:
    behavior: mix
    default_api_key_env: OPENCODE_API_KEY
    require_base_url: true

  custom:
    behavior: mix
    require_base_url: true

  openai:
    behavior: openai
    require_base_url: true

  anthropic:
    behavior: anthropic
    default_api_key_env: ANTHROPIC_API_KEY
    require_base_url: true

  mix:
    behavior: mix
    require_base_url: true
