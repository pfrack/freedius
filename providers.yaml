# providers.yaml — single source of truth for all freedius provider metadata.
#
# Each entry declares a user-facing provider name plus its runtime behavior
# class, default values, and adapter-specific tweaks. Adding a provider is
# one YAML entry + `go generate ./...`.
#
# Field reference:
#   behavior:           openai | anthropic | mix — runtime adapter class
#   default_base_url:   URL applied when user does not set default_base_url
#   default_api_key_env: env-var name applied when user does not set
#                        default_api_key_env
#   require_base_url:   true if the adapter needs an explicit default_base_url
#                       (false when default_base_url is provided)
#   manual:             true to skip adapter generation — user provides
#                       hand-written logic and wires it via NewDefaultRegistry
#                       overrides; the provider still appears in
#                       providerDefaults with its declared defaults.
#   openai:             openai-behavior-specific adapter tweaks
#     no_stream_usage:  suppress OpenAI stream_options.include_usage
#     pre_send_hook:    name of a func([]byte)([]byte, error) in the proxy
#                       package invoked before sending the request body

providers:
  nim:
    behavior: openai
    default_base_url: https://integrate.api.nvidia.com/v1/chat/completions
    default_api_key_env: NVIDIA_NIM_API_KEY
    require_base_url: false
    openai:
      no_stream_usage: true
      pre_send_hook: sanitizeNIMBody

  zen:
    behavior: mix
    default_api_key_env: OPENCODE_API_KEY
    require_base_url: true

  go:
    behavior: mix
    default_api_key_env: OPENCODE_API_KEY
    require_base_url: true

  custom:
    behavior: mix
    require_base_url: true

  openai:
    behavior: openai
    require_base_url: true

  anthropic:
    behavior: anthropic
    default_api_key_env: ANTHROPIC_API_KEY
    require_base_url: false

  mix:
    behavior: mix
    require_base_url: true

  google:
    behavior: openai
    default_base_url: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
    default_api_key_env: GEMINI_API_KEY
    require_base_url: false
    openai:
      no_stream_usage: true

  mistral:
    behavior: openai
    default_base_url: https://api.mistral.ai/v1/chat/completions
    default_api_key_env: MISTRAL_API_KEY
    require_base_url: false

  deepseek:
    behavior: openai
    default_base_url: https://api.deepseek.com/chat/completions
    default_api_key_env: DEEPSEEK_API_KEY
    require_base_url: false

  groq:
    behavior: openai
    default_base_url: https://api.groq.com/openai/v1/chat/completions
    default_api_key_env: GROQ_API_KEY
    require_base_url: false

  together:
    behavior: openai
    default_base_url: https://api.together.xyz/v1/chat/completions
    default_api_key_env: TOGETHER_API_KEY
    require_base_url: false

  fireworks:
    behavior: openai
    default_base_url: https://api.fireworks.ai/inference/v1/chat/completions
    default_api_key_env: FIREWORKS_API_KEY
    require_base_url: false

  cohere:
    behavior: openai
    default_base_url: https://api.cohere.com/compatibility/v1/chat/completions
    default_api_key_env: COHERE_API_KEY
    require_base_url: false

  ollama:
    behavior: openai
    default_base_url: http://localhost:11434/v1/chat/completions
    require_base_url: false
    openai:
      no_stream_usage: true

  lmstudio:
    behavior: openai
    default_base_url: http://localhost:1234/v1/chat/completions
    require_base_url: false
    openai:
      no_stream_usage: true
